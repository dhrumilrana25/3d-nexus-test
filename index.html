<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashu's Epic Journey | UTA '26</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <style>
        /* --- GOD TIER VARIABLES --- */
        :root {
            --uta-blue: #0064B1;
            --uta-glow: rgba(0, 100, 177, 0.9);
            --black: #020204;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background-color: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; overflow: hidden; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--uta-blue); }

        /* --- LIQUID CURSOR --- */
        #cursor { position: fixed; width: 10px; height: 10px; border-radius: 50%; background: var(--white); mix-blend-mode: difference; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: transform 0.2s; }
        #cursor-trail { position: fixed; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--uta-blue); box-shadow: 0 0 15px var(--uta-glow); pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: 0.1s ease-out; }

        /* Disable custom cursor on touch devices */
        @media (pointer: coarse) { * { cursor: auto !important; } #cursor, #cursor-trail { display: none !important; } }

        /* --- VAULT PRELOADER --- */
        #preloader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9000; display: flex; flex-direction: column; justify-content: center; align-items: center; perspective: 1000px; }
        .core { width: 60px; height: 60px; border: 2px solid var(--uta-blue); transform: rotate(45deg); animation: pulse-core 2s infinite ease-in-out; margin-bottom: 40px; box-shadow: 0 0 30px var(--uta-glow); }
        @keyframes pulse-core { 0%, 100% { transform: rotate(45deg) scale(1); opacity: 0.8; } 50% { transform: rotate(45deg) scale(1.2); opacity: 1; box-shadow: 0 0 50px var(--uta-glow), inset 0 0 20px var(--uta-glow); } }
        
        #load-text { font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 12px; color: #888; margin-bottom: 30px; text-transform: uppercase; text-align: center; }
        #enter-btn { padding: 15px 60px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: var(--white); font-family: 'Montserrat', sans-serif; letter-spacing: 5px; border-radius: 2px; opacity: 0; transform: translateY(20px); transition: all 0.5s; pointer-events: none; text-transform: uppercase; }
        #enter-btn.ready { opacity: 1; transform: translateY(0); pointer-events: all; border-color: var(--uta-blue); }
        #enter-btn.ready:hover { background: rgba(0, 100, 177, 0.2); box-shadow: 0 0 40px var(--uta-glow) inset, 0 0 20px var(--uta-glow); }

        /* --- 3D CANVAS --- */
        #webgl-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }

        /* --- MASTER LAYOUT --- */
        main { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; opacity: 0; }
        .panel { min-height: 100vh; width: 100%; max-width: 1600px; display: flex; align-items: center; padding: 15vh 5%; }

        .hero { justify-content: center; text-align: center; height: 100vh; flex-direction: column; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(4rem, 8vw, 7.5rem); letter-spacing: 6px; line-height: 1.1; text-shadow: 0 0 50px var(--uta-glow); margin-bottom: 10px; }
        .hero h2 { font-size: clamp(1.5rem, 3vw, 2.2rem); font-weight: 200; font-style: italic; letter-spacing: 4px; color: #ccc; }
        .scroll-down { position: absolute; bottom: 5vh; font-size: 0.8rem; letter-spacing: 8px; animation: pulse-text 2s infinite; opacity: 0.4; }
        @keyframes pulse-text { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; text-shadow: 0 0 10px var(--white); } }

        /* --- PERFECT ALIGNMENT GALLERIES --- */
        .chapter-container { display: flex; flex-direction: column; width: 100%; gap: 6vh; z-index: 2; align-items: center; }
        
        .poem-block {
            max-width: 800px; width: 100%; background: rgba(8, 8, 12, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: clamp(30px, 5vw, 50px) clamp(20px, 5vw, 60px); 
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            text-align: center; border-radius: 4px;
        }
        .chapter-title { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 5vw, 3.5rem); margin-bottom: 20px; color: var(--white); text-transform: uppercase; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .poem-text { font-size: clamp(1rem, 2vw, 1.3rem); line-height: 2.2; color: #e0e0e0; font-weight: 300; font-style: italic; }

        .gallery { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; 
            width: 100%; max-width: 1400px; perspective: 2000px;
            padding: 40px 0;
        }

        /* Parallax wrapper completely isolates scrolling physics from hover physics */
        .parallax-wrap { will-change: transform; }

        .frame {
            width: clamp(260px, 25vw, 320px); height: clamp(340px, 33vw, 420px); 
            border-radius: 8px; padding: 12px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            transform-style: preserve-3d; transition: border 0.4s ease;
            position: relative;
        }
        .frame:hover { border-color: rgba(0, 100, 177, 0.8); z-index: 50; }
        
        .photo-inner {
            width: 100%; height: 100%; border-radius: 4px; background-size: cover; background-position: center;
            filter: grayscale(60%) brightness(0.8); transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateZ(20px); position: relative; overflow: hidden;
        }
        .frame:hover .photo-inner { filter: grayscale(0%) brightness(1.1); box-shadow: 0 0 30px rgba(0, 100, 177, 0.4); }

        .glare { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.3) 25%, transparent 30%); transform: translateX(-150%); transition: transform 0.6s; z-index: 2; pointer-events: none; }
        .frame:hover .glare { transform: translateX(150%); }

        /* --- FULLSCREEN LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            z-index: 100000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        #lightbox.active { opacity: 1; pointer-events: all; }
        #lightbox-img {
            max-width: 90%; max-height: 90%; width: auto; height: auto;
            border-radius: 8px; box-shadow: 0 0 80px rgba(0, 100, 177, 0.8);
            transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        #lightbox.active #lightbox-img { transform: scale(1); width: 85vw; height: 85vh; }
        .close-btn { position: absolute; top: 30px; right: 40px; font-size: 2.5rem; color: #fff; opacity: 0.6; transition: 0.3s; padding: 20px; font-family: sans-serif; cursor: pointer !important; }
        .close-btn:hover { opacity: 1; transform: rotate(90deg); color: var(--uta-blue); }

    </style>
</head>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // ==========================================
        // 1. MAGNETIC CURSOR & LIGHTBOX UX
        // ==========================================
        const cursor = document.getElementById('cursor');
        const trail = document.getElementById('cursor-trail');
        let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
        let trailX = mouseX, trailY = mouseY;

        // Check if device is touch screen
        const isTouch = window.matchMedia("(pointer: coarse)").matches;

        if (!isTouch) {
            document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
            function animateCursor() {
                cursor.style.left = `${mouseX}px`; cursor.style.top = `${mouseY}px`;
                trailX += (mouseX - trailX) * 0.2; trailY += (mouseY - trailY) * 0.2;
                trail.style.left = `${trailX}px`; trail.style.top = `${trailY}px`;
                requestAnimationFrame(animateCursor);
            }
            animateCursor();
        }

        // 3D Tilt for Photo Frames (Applied to inner frame, preventing parallax clash)
        document.querySelectorAll('.frame').forEach(frame => {
            frame.addEventListener('mousemove', (e) => {
                if (isTouch) return;
                const rect = frame.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const rotateX = ((y - rect.height/2) / (rect.height/2)) * -15;
                const rotateY = ((x - rect.width/2) / (rect.width/2)) * 15;
                frame.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                
                cursor.style.transform = 'translate(-50%, -50%) scale(0)';
                trail.style.transform = 'translate(-50%, -50%) scale(2.5)';
                trail.style.background = 'rgba(255,255,255,0.05)'; trail.style.borderColor = '#fff';
            });
            frame.addEventListener('mouseleave', () => {
                if (isTouch) return;
                frame.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                trail.style.transform = 'translate(-50%, -50%) scale(1)';
                trail.style.background = 'transparent'; trail.style.borderColor = 'rgba(0, 100, 177, 0.9)';
            });
        });

        // LIGHTBOX ENGINE
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        
        document.querySelectorAll('.photo-inner').forEach(photo => {
            photo.addEventListener('click', () => {
                const bgUrl = photo.style.backgroundImage;
                lightboxImg.style.backgroundImage = bgUrl;
                lightbox.classList.add('active');
                document.body.style.overflowY = 'hidden'; 
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
            document.body.style.overflowY = 'auto';
        });

        // ==========================================
        // 2. THREE.JS: THE DIAMOND GLASS PHYSICS
        // ==========================================
        const canvas = document.querySelector('#webgl-canvas');
        const scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x020204, 0.015);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 300);
        camera.position.z = 30;

        // Cap performance for high DPI screens to keep framerate smooth
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const blueLight = new THREE.PointLight(0x0064B1, 10, 100); blueLight.position.set(-15, 10, 5); scene.add(blueLight);
        const whiteLight = new THREE.PointLight(0xffffff, 5, 100); whiteLight.position.set(15, -15, 5); scene.add(whiteLight);

        // Heavy Crystal Glass Material
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0x004a8c, metalness: 0.2, roughness: 0.1, transmission: 0.95, thickness: 2.5,
            clearcoat: 1.0, clearcoatRoughness: 0.1, ior: 1.5, side: THREE.DoubleSide
        });
        const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });

        const quantumGroup = new THREE.Group();
        const boardGeo = new THREE.BoxGeometry(7, 0.2, 7);
        const board = new THREE.Mesh(boardGeo, glassMat);
        board.add(new THREE.LineSegments(new THREE.EdgesGeometry(boardGeo), edgeMat));

        const capGeo = new THREE.CylinderGeometry(2.5, 3, 2.5, 32);
        const baseCap = new THREE.Mesh(capGeo, glassMat);
        baseCap.add(new THREE.LineSegments(new THREE.EdgesGeometry(capGeo), edgeMat));
        baseCap.position.y = -1.2;

        quantumGroup.add(board, baseCap);
        quantumGroup.position.set(7, -3, -5); 
        scene.add(quantumGroup);

        // Vortex Particles Optimized
        const pGeo = new THREE.BufferGeometry();
        const particleCount = isTouch ? 3000 : 6000; // Less particles on mobile
        const pPos = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount*3; i+=3){
            let r = 25 + Math.random() * 80, theta = Math.random() * Math.PI*2, phi = Math.acos((Math.random()*2)-1);
            pPos[i] = r * Math.sin(phi) * Math.cos(theta); pPos[i+1] = r * Math.sin(phi) * Math.sin(theta); pPos[i+2] = r * Math.cos(phi) - 40;
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({ size: 0.15, color: 0x0064B1, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const vortex = new THREE.Points(pGeo, pMat); scene.add(vortex);

        // Epic Bloom
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.4, 0.85);
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene); composer.addPass(bloomPass);

        // ==========================================
        // 3. BOOT SEQUENCE & GSAP ANIMATIONS
        // ==========================================
        let loadProgress = 0;
        const fakeLoad = setInterval(() => {
            loadProgress += Math.random() * 12;
            if(loadProgress >= 100) {
                clearInterval(fakeLoad); loadProgress = 100;
                document.getElementById('enter-btn').classList.add('ready');
                document.getElementById('load-text').innerHTML = "SYSTEM READY";
            }
            document.getElementById('percent').innerText = Math.floor(loadProgress);
        }, 100);

        document.getElementById('enter-btn').addEventListener('click', () => {
            // Vault Open Effect
            gsap.to('#preloader', { scale: 3, opacity: 0, filter: "blur(20px)", duration: 1.5, ease: "power4.inOut", onComplete: () => {
                document.getElementById('preloader').style.display = 'none';
                document.body.style.overflowY = 'auto';
            }});
            gsap.to('main', { opacity: 1, duration: 2, delay: 0.5 });
            document.getElementById('bgm').volume = 0.5; document.getElementById('bgm').play().catch(e=>{});
            gsap.from('.scramble-title', { y: 100, opacity: 0, duration: 1.5, stagger: 0.2, ease: "power4.out", delay: 0.8 });
        });

        // 3D Glass Scroll Physics
        const capTl = gsap.timeline({ scrollTrigger: { trigger: "main", start: "top top", end: "bottom bottom", scrub: 1.5 } });
        capTl.to(quantumGroup.position, { x: -8, y: 3, z: 2 }, 0).to(quantumGroup.rotation, { x: Math.PI/1.5, y: Math.PI }, 0)
             .to(board.position, { y: 4 }, 0).to(quantumGroup.position, { x: 8, y: -2, z: 8 }, 0.4).to(quantumGroup.rotation, { x: -0.2, y: Math.PI*2 }, 0.4)
             .to(board.position, { y: 0 }, 0.4).to(quantumGroup.position, { x: 0, y: 0, z: -8 }, 0.8).to(quantumGroup.rotation, { x: 0.3, y: Math.PI*4 }, 0.8);

        // Cipher Matrix Text
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        function decodeText(element) {
            if(element.decoded) return; element.decoded = true;
            const original = element.getAttribute('data-text'); let iter = 0;
            const int = setInterval(() => {
                element.innerText = original.split("").map((l, i) => i < iter ? original[i] : letters[Math.floor(Math.random()*36)]).join("");
                if(iter >= original.length) clearInterval(int); iter += 1/3;
            }, 30);
        }

        document.querySelectorAll('.chapter-trigger').forEach((chapter) => {
            const block = chapter.querySelector('.poem-block');
            const cipher = chapter.querySelector('.cipher-text');
            const parallaxWraps = chapter.querySelectorAll('.parallax-wrap'); // Target the wrapper for scroll physics!

            const tl = gsap.timeline({ scrollTrigger: { trigger: chapter, start: "top 75%" } });
            if(block) tl.fromTo(block, { scale: 0.85, opacity: 0, y: 50 }, { scale: 1, opacity: 1, y: 0, duration: 1.5, ease: "expo.out" });
            ScrollTrigger.create({ trigger: chapter, start: "top 70%", onEnter: () => decodeText(cipher) });

            if(parallaxWraps.length) {
                // Initial entrance scatter
                tl.fromTo(parallaxWraps, { y: 200, z: -500, rotationX: 45, opacity: 0 }, { y: 0, z: 0, rotationX: 0, opacity: 1, duration: 1.5, stagger: 0.1, ease: "power4.out" }, "-=1");
                
                // Continuous Parallax linked to the center of the viewport
                parallaxWraps.forEach(wrap => {
                    const speed = parseFloat(wrap.getAttribute('data-speed'));
                    gsap.to(wrap, {
                        y: () => -100 * speed,
                        ease: "none",
                        scrollTrigger: { trigger: chapter, start: "top bottom", end: "bottom top", scrub: true }
                    });
                });
            }
        });

        // ==========================================
        // RENDER LOOP
        // ==========================================
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            vortex.rotation.y = time * 0.02; vortex.rotation.x = time * 0.01;
            quantumGroup.position.y += Math.sin(time * 2) * 0.005;

            if (!isTouch) {
                camera.position.x += ((mouseX / window.innerWidth - 0.5) * 6 - camera.position.x) * 0.05;
                camera.position.y += (-(mouseY / window.innerHeight - 0.5) * 6 - camera.position.y) * 0.05;
            }
            camera.lookAt(scene.position);

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
